name: Build Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE=../release-key.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Rename APK
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
          BUILD=${{ github.run_number }}
          cp app/build/outputs/apk/release/*.apk bookstore-v${VERSION}-build${BUILD}.apk
          echo "APK_FILE=bookstore-v${VERSION}-build${BUILD}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstore-release-${{ github.run_number }}
          path: bookstore-*.apk
          retention-days: 30

      # На каждый пуш в master — обновляем "latest" pre-release
      - name: Publish to latest release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (v${{ env.VERSION }} #${{ github.run_number }})"
          prerelease: true
          make_latest: true
          files: bookstore-*.apk
          body: |
            Автосборка с ветки master.
            Коммит: ${{ github.sha }}
            Собрано: ${{ github.run_number }}

      # На тег v* — создаём нормальный именованный релиз
      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bookstore-*.apk
          generate_release_notes: true
          make_latest: true
