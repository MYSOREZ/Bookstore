name: Build Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

# Secrets needed (Settings → Secrets → Actions):
#   KEYSTORE_BASE64  — base64-encoded release-key.jks
#                      Linux/Mac: base64 -w 0 release-key.jks
#                      Windows:   certutil -encode release-key.jks tmp && findstr /v CERTIFICATE tmp
#   KEYSTORE_PASSWORD — storePassword (same as in gradle.properties locally)
#   KEY_ALIAS         — keyAlias
#   KEY_PASSWORD      — keyPassword

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE=../release-key.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Rename APK
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
          cp app/build/outputs/apk/release/*.apk bookstore-v${VERSION}-release.apk
          echo "APK_NAME=bookstore-v${VERSION}-release.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstore-release-${{ github.run_number }}
          path: bookstore-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bookstore-*.apk
          generate_release_notes: true
