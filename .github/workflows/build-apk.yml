name: Build Release APK

on:
  push:
    branches: [ main, master, 'claude/**' ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE=../release-key.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Rename APK
        run: |
          VERSION=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
          BUILD=${{ github.run_number }}
          cp app/build/outputs/apk/release/*.apk bookstore-v${VERSION}-build${BUILD}.apk
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Publish to latest release
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest (v${{ env.VERSION }} #${{ github.run_number }})"
          prerelease: true
          make_latest: true
          files: bookstore-*.apk
          body: "Build #${{ github.run_number }} | branch: ${{ github.ref_name }} | commit: ${{ github.sha }}"

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bookstore-*.apk
          generate_release_notes: true
          make_latest: true
